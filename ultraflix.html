
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>B-2 STEALTH – Premium Live TV</title>

    <!-- iOS Meta Tags -->
    <meta name="theme-color" content="#050505">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link rel="apple-touch-icon" href="https://i.imgur.com/yaOex69.png">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;900&family=Rajdhani:wght@500;600;700&display=swap" rel="stylesheet">

    <script src="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/shaka-player.ui.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/shaka-player/4.7.1/controls.css">
    
    <style>
    /* === B-2 STEALTH THEME & GLOBAL STYLES === */
    :root {
        --b2-red: #ff2a2a;
        --b2-dark-red: #c90000;
        --b2-bg-dark: rgba(5, 5, 8, 0.85);
        --glass-bg: rgba(20, 20, 25, 0.4);
        --glass-hover: rgba(35, 35, 45, 0.6);
        --glass-border: rgba(255, 255, 255, 0.08);
        --text-light: #ffffff;
        --text-muted: #b0b0c0;
        --top-bar-height: 70px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
        background: linear-gradient(to bottom, rgba(5, 5, 10, 0.75), rgba(0, 0, 0, 0.95)), 
                    url('https://upload.wikimedia.org/wikipedia/commons/e/e8/B-2_Spirit_original.jpg') no-repeat center center fixed;
        background-size: cover;
        color: var(--text-light);
        font-family: 'Poppins', sans-serif;
        user-select: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
        height: 100vh;
        animation: smoothPageLoad 1s cubic-bezier(0.25, 1, 0.5, 1) forwards;
    }

    @keyframes smoothPageLoad {
        0% { opacity: 0; transform: scale(1.02); }
        100% { opacity: 1; transform: scale(1); }
    }

    /* === TOP BAR === */
    .top-bar {
        position: fixed;
        top: 0; left: 0; width: 100%; height: var(--top-bar-height);
        background: rgba(10, 10, 15, 0.6);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        display: flex; justify-content: space-between; align-items: center;
        padding: 0 4%; z-index: 2000;
        box-shadow: 0 4px 30px rgba(0, 0, 0, 0.8);
        border-bottom: 1px solid var(--glass-border);
    }

    .brand-container { 
        display: flex; align-items: center; gap: 12px; cursor: pointer;
        transition: transform 0.3s ease;
    }
    .brand-container:hover { transform: scale(1.05); }
    
    .brand-name {
        font-family: 'Rajdhani', sans-serif;
        font-size: 2.2rem; font-weight: 700;
        color: #fff;
        letter-spacing: 2px;
        text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
    }
    .brand-name span { color: var(--b2-red); }

    .live-badge {
        display: flex; align-items: center; gap: 5px;
        background: rgba(0, 0, 0, 0.4);
        color: #ffffff;
        font-size: 0.55rem; font-weight: 700;
        padding: 3px 6px; border-radius: 4px;
        border: 1px solid #ffffff;
        letter-spacing: 1px;
        box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .live-dot {
        width: 6px; height: 6px;
        background-color: var(--b2-red);
        border-radius: 50%;
        animation: pulseLive 1.5s infinite;
    }

    @keyframes pulseLive {
        0% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0.8); transform: scale(0.95); }
        70% { box-shadow: 0 0 0 5px rgba(255, 42, 42, 0); transform: scale(1.1); }
        100% { box-shadow: 0 0 0 0 rgba(255, 42, 42, 0); transform: scale(0.95); }
    }

    .top-actions { display: flex; align-items: center; gap: 12px; }

    .search-trigger, .profile-icon {
        cursor: pointer; display: flex; align-items: center; justify-content: center;
        width: 36px; height: 36px; border-radius: 50%; 
        background: var(--glass-bg); transition: all 0.3s ease;
        color: white; border: 1px solid var(--glass-border); text-decoration: none;
        backdrop-filter: blur(10px);
    }
    .search-trigger:hover, .profile-icon:hover { 
        background: var(--b2-red); 
        border-color: var(--b2-red);
        transform: translateY(-2px);
        box-shadow: 0 4px 15px rgba(255, 42, 42, 0.4);
    }
    
    .search-trigger svg, .profile-icon svg { 
        width: 18px; height: 18px; fill: white; 
    }

    .search-box-wrapper {
        display: none; align-items: center;
        background: rgba(0, 0, 0, 0.8); border: 1px solid var(--b2-red);
        border-radius: 50px; padding: 4px 12px; position: absolute; right: 100px;
        backdrop-filter: blur(10px);
    }
    .search-box-wrapper.active { display: flex; animation: searchFade 0.4s ease; }
    
    @keyframes searchFade {
        from { opacity: 0; transform: translateX(20px) scale(0.9); }
        to { opacity: 1; transform: translateX(0) scale(1); }
    }

    #searchInput {
        background: transparent; border: none; color: #fff;
        padding: 4px 8px; outline: none; width: 160px;
        font-family: 'Poppins', sans-serif; font-size: 0.85rem;
    }

    /* === MAIN LAYOUT === */
    .main-content {
        display: flex;
        flex-direction: column;
        flex: 1;
        margin-top: var(--top-bar-height);
        height: calc(100vh - var(--top-bar-height));
    }

    @media (min-width: 950px) {
        .main-content { flex-direction: row; padding: 20px 4%; gap: 30px; }
    }

    /* === PLAYER SECTION === */
    .player-container {
        width: 100%; z-index: 100;
        padding: 10px 4% 0; flex-shrink: 0;
    }

    @media (min-width: 950px) {
        .player-container {
            width: 65%; padding: 0; position: sticky;
            top: calc(var(--top-bar-height) + 20px); height: fit-content;
        }
    }

    .video-wrapper {
        width: 100%; aspect-ratio: 16/9; background: #000;
        border-radius: 12px; overflow: hidden; position: relative;
        box-shadow: 0 20px 50px rgba(0,0,0,0.9);
        border: 1px solid rgba(255, 255, 255, 0.1);
    }
    #video { width: 100%; height: 100%; outline: none; }

    .ultraflix-watermark {
        position: absolute; bottom: 50px; right: 15px; 
        text-align: right; z-index: 10; opacity: 0; visibility: hidden;
        transition: all 0.4s ease; pointer-events: none;
        transform: translateY(10px);
    }
    .ultraflix-watermark.show-watermark { opacity: 1; visibility: visible; transform: translateY(0); }
    .uf-powered { color: #ffffff; font-size: 0.55rem; font-weight: 500; opacity: 0.7; font-family: 'Rajdhani', sans-serif;} 
    .uf-brand {
        color: var(--b2-red); font-size: 1.1rem; font-weight: 700; font-family: 'Rajdhani', sans-serif;
        letter-spacing: 1px; text-shadow: 0 1px 5px rgba(0,0,0,0.9);
    }

    /* === CHANNEL CATEGORIES === */
    .channels-scroll-area {
        flex: 1; overflow-y: auto; padding: 15px 4% 30px;
        -ms-overflow-style: none; scrollbar-width: none;
        scroll-behavior: smooth;
    }
    .channels-scroll-area::-webkit-scrollbar { display: none; }

    @media (min-width: 950px) {
        .channels-scroll-area { width: 35%; padding: 0; padding-right: 10px; }
    }

    .channels-container { display: flex; flex-direction: column; gap: 30px; }
    
    .cat-section { transition: opacity 0.4s ease; }
    .cat-section.hidden-cat { display: none !important; }
    .channels-container .cat-title { display: none !important; }

    .netflix-cat-header {
        display: flex; justify-content: space-between; align-items: center;
        margin-bottom: 12px; padding: 0 5px;
    }
    .netflix-cat-title { 
        font-size: 1.1rem; font-weight: 600; color: #fff; 
        letter-spacing: 1px; border-left: 3px solid var(--b2-red);
        padding-left: 10px; font-family: 'Rajdhani', sans-serif;
        text-transform: uppercase;
    }
    
    .see-all-btn {
        font-size: 0.75rem; font-weight: 600; color: var(--text-muted);
        cursor: pointer; transition: all 0.3s ease;
        display: flex; align-items: center; gap: 4px;
        background: var(--glass-bg); border: 1px solid var(--glass-border); padding: 4px 12px;
        border-radius: 20px; backdrop-filter: blur(5px);
    }
    .see-all-btn:hover { color: #fff; background: var(--glass-hover); border-color: var(--b2-red); }

    .channels-container .app-grid {
        display: flex !important; flex-direction: row; flex-wrap: nowrap;
        overflow-x: auto; gap: 15px !important; padding: 5px 5px 15px 5px;
        scroll-behavior: smooth; -ms-overflow-style: none; scrollbar-width: none;
    }
    .channels-container .app-grid::-webkit-scrollbar { display: none; }

    .channels-container .app-grid.expanded-grid {
        display: grid !important;
        grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
        gap: 18px !important;
        overflow-x: visible;
        animation: gridExpand 0.5s cubic-bezier(0.25, 1, 0.5, 1);
    }
    
    @keyframes gridExpand {
        from { opacity: 0; transform: translateY(20px) scale(0.98); }
        to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .channels-container .channel-card {
        width: 140px !important; min-width: 140px !important; max-width: 140px !important;
        flex-shrink: 0 !important; position: relative !important;
        background: var(--glass-bg) !important; border-radius: 12px !important;
        padding: 8px !important; display: flex; flex-direction: column;
        align-items: center; text-decoration: none; color: var(--text-light) !important;
        transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
        cursor: pointer;
        border: 1px solid var(--glass-border);
        backdrop-filter: blur(12px);
        -webkit-backdrop-filter: blur(12px);
    }
    
    .app-grid.expanded-grid .channel-card {
        width: 100% !important; min-width: unset !important; max-width: unset !important;
    }

    .channels-container .channel-card:hover {
        transform: translateY(-5px) scale(1.05) !important; 
        background: var(--glass-hover) !important; z-index: 2;
        box-shadow: 0 15px 30px rgba(0,0,0,0.8);
        border-color: rgba(255, 255, 255, 0.2);
    }
    .channels-container .channel-card.active { 
        border: 2px solid var(--b2-red) !important; padding: 7px !important; 
        box-shadow: 0 0 20px rgba(255, 42, 42, 0.3) inset;
    }

    .channels-container .icon-box {
        width: 100% !important; aspect-ratio: 16/9 !important; 
        border-radius: 8px !important; background: rgba(0,0,0,0.6) !important; 
        margin-bottom: 8px !important; display: flex !important; 
        align-items: center !important; justify-content: center !important;
        overflow: hidden; position: relative;
    }

    .channels-container .icon-box img {
        width: 100% !important; height: 100% !important; 
        object-fit: cover !important; z-index: 2; position: relative;
        transition: transform 0.4s ease;
    }
    .channels-container .channel-card:hover .icon-box img { transform: scale(1.08); }

    .channels-container .channel-card span {
        font-size: 0.8rem; font-weight: 500; width: 100%; 
        text-align: left; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        opacity: 0.9;
    }

    .loading-spinner {
        position: absolute; top: 50%; left: 50%; width: 50px; height: 50px;
        margin: -25px 0 0 -25px; border: 3px solid rgba(255, 255, 255, 0.05);
        border-top: 3px solid var(--b2-red); border-radius: 50%;
        animation: spin 1s cubic-bezier(0.5, 0, 0.5, 1) infinite; z-index: 20; display: none;
    }
    @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

    /* === PWA INSTALL NOTIFICATION BANNER === */
    .pwa-notification {
        position: fixed;
        bottom: -100px;
        left: 50%;
        transform: translateX(-50%);
        background: rgba(10, 10, 15, 0.85);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid var(--b2-red);
        border-radius: 50px;
        padding: 12px 25px;
        display: flex;
        align-items: center;
        gap: 20px;
        z-index: 3000;
        box-shadow: 0 10px 40px rgba(0, 0, 0, 0.9), 0 0 20px rgba(255, 42, 42, 0.2);
        transition: bottom 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        width: 90%;
        max-width: 450px;
        justify-content: space-between;
    }

    .pwa-notification.show {
        bottom: 30px;
    }

    .pwa-text { display: flex; flex-direction: column; }
    .pwa-title { font-family: 'Rajdhani', sans-serif; font-weight: 700; font-size: 1.1rem; color: #fff; letter-spacing: 1px; }
    .pwa-desc { font-family: 'Poppins', sans-serif; font-size: 0.7rem; color: var(--text-muted); }

    .pwa-actions { display: flex; align-items: center; gap: 15px; }

    .pwa-install-btn {
        background: var(--b2-red); color: white; border: none; padding: 8px 18px;
        border-radius: 20px; font-size: 0.8rem; font-weight: 600; font-family: 'Poppins', sans-serif;
        cursor: pointer; transition: all 0.3s ease; box-shadow: 0 4px 15px rgba(255, 42, 42, 0.4);
    }
    .pwa-install-btn:hover { background: var(--b2-dark-red); transform: translateY(-2px); }

    .pwa-close-btn {
        background: transparent; border: none; color: var(--text-muted); font-size: 1.2rem;
        cursor: pointer; transition: color 0.3s ease; padding: 0; line-height: 1;
    }
    .pwa-close-btn:hover { color: white; }
    </style>
</head>

<body>

    <!-- PWA Install Notification -->
    <div id="pwaNotification" class="pwa-notification">

            <div class="pwa-title">B-2 STEALTH App</div>

    <header class="top-bar">

                <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
            </div>

                <input type="text" id="searchInput" placeholder="Search targets..." autocomplete="off">

            <a href="https://saman-pushpa-kumara.github.io/SMART_TV/privacy.html" target="_blank" class="profile-icon">
                <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z"/></svg>

    <!-- === MAIN CONTENT === -->
    <div class="main-content">
        <!-- PLAYER -->
        <div class="player-container">
            <div class="video-wrapper" data-shaka-player-container>
                <video data-shaka-player id="video" autoplay playsinline></video>
                <div id="loadingSpinner" class="loading-spinner"></div>
                <div class="ultraflix-watermark" id="ultraflixWatermark">
                    <div class="uf-powered">Powered by</div>
                    <div class="uf-brand">B-2 TECH</div>
                </div>
            </div>
        </div>

        <!-- CHANNELS -->
        <div class="channels-scroll-area">
            <div class="channels-container" id="channelsContainer">
                <!-- Channels will be injected here -->
            </div>
        </div>
    </div>
    
<script src="script.js"></script>
<script src="https://cdn.jsdelivr.net/gh/USERNAME/REPO@main/script.js"></script>

<script>
    // === 1. SINGLE FILE DYNAMIC PWA SYSTEM (For Blogger) ===
    (function initDynamicPWA() {
        // Create Dynamic Manifest URL
        const manifestObj = {
            "name": "B-2 STEALTH Premium",
            "short_name": "B-2 STEALTH",
            "start_url": window.location.href.split('?')[0],
            "display": "standalone",
            "background_color": "#050505",
            "theme_color": "#ff2a2a",
            "icons": [
                {
                    "src": "https://i.imgur.com/yaOex69.png",
                    "sizes": "192x192",
                    "type": "image/png",
                    "purpose": "any maskable"
                },
                {
                    "src": "https://i.imgur.com/yaOex69.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };

        const manifestString = JSON.stringify(manifestObj);
        const encodedManifest = 'data:application/manifest+json;charset=utf-8,' + encodeURIComponent(manifestString);
        
        // Inject Manifest
        let manifestLink = document.createElement('link');
        manifestLink.rel = 'manifest';
        manifestLink.href = encodedManifest;
        document.head.appendChild(manifestLink);

        // Try to inject virtual Service Worker (To trick browser into showing prompt)
        if ('serviceWorker' in navigator) {
            const swCode = `self.addEventListener('fetch', (event) => {});`;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {
                console.log("Virtual SW Blocked (Expected in strict browsers), Fallback enabled.");
            });
        }
    })();

    // === 2. PWA NOTIFICATION LOGIC ===
    let deferredPrompt = null;
    let isAppInstalled = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
    
    const pwaNotification = document.getElementById('pwaNotification');
    const pwaInstallBtn = document.getElementById('pwaInstallBtn');
    const pwaCloseBtn = document.getElementById('pwaCloseBtn');

    // Listen for native install prompt
    window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        if (!isAppInstalled) {
            setTimeout(() => pwaNotification.classList.add('show'), 2000); 
        }
    });

    // Fallback if browser blocks automatic prompt (Very common on Blogger)
    setTimeout(() => {
        if (!deferredPrompt && !isAppInstalled) {
            pwaNotification.classList.add('show');
        }
    }, 4000);

    // Install Button Action
    pwaInstallBtn.addEventListener('click', async () => {
        if (deferredPrompt) {
            // Native Prompt
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            deferredPrompt = null;
            pwaNotification.classList.remove('show');
        } else {
            // Smart Fallback Instructions
            alert("To Install App:\n\n1. Tap the Browser Menu ( ⋮ or ⇪ )\n2. Select 'Add to Home screen' or 'Install App'");
            pwaNotification.classList.remove('show');
        }
    });

    pwaCloseBtn.addEventListener('click', () => pwaNotification.classList.remove('show'));

    window.addEventListener('appinstalled', () => {
        deferredPrompt = null;
        isAppInstalled = true;
        pwaNotification.classList.remove('show');
    });

    // === 3. SEARCH & UI LOGIC (Original Code) ===
    const searchToggle = document.getElementById('searchToggle');
    const searchWrapper = document.getElementById('searchWrapper');
    const searchInput = document.getElementById('searchInput');

    searchToggle.addEventListener('click', () => {
        searchWrapper.classList.toggle('active');
        if(searchWrapper.classList.contains('active')) searchInput.focus();
    });

    setInterval(() => {
        const controls = document.querySelector('.shaka-controls-container');
        const watermark = document.getElementById('ultraflixWatermark');
        if (controls && watermark) {
            const opacity = window.getComputedStyle(controls).opacity;
            const isHidden = controls.classList.contains('shaka-hidden') || opacity === '0';
            if (!isHidden) watermark.classList.add('show-watermark');
            else watermark.classList.remove('show-watermark');
        }
    }, 250);

    const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
            mutation.addedNodes.forEach((node) => {
                if (node.nodeType === 1 && node.classList.contains('cat-section')) {
                    const oldTitle = node.querySelector('.cat-title');
                    const grid = node.querySelector('.app-grid');

                    if (oldTitle && !oldTitle.hasAttribute('data-modified')) {
                        oldTitle.setAttribute('data-modified', 'true');
                        const titleText = oldTitle.innerText || oldTitle.textContent;

                        const headerWrapper = document.createElement('div');
                        headerWrapper.className = 'netflix-cat-header';

                        const newTitle = document.createElement('div');
                        newTitle.className = 'netflix-cat-title';
                        newTitle.innerText = titleText;

                        const seeAllBtn = document.createElement('button');
                        seeAllBtn.className = 'see-all-btn';
                        seeAllBtn.innerHTML = 'VIEW ALL <svg viewBox="0 0 24 24" style="width:12px;fill:currentColor;margin-left:2px;"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>';

                        seeAllBtn.onclick = () => {
                            const allCategories = document.querySelectorAll('.cat-section');
                            if (grid.classList.contains('expanded-grid')) {
                                history.back();
                            } else {
                                grid.classList.add('expanded-grid');
                                allCategories.forEach(cat => {
                                    if(cat !== node) cat.classList.add('hidden-cat');
                                });
                                seeAllBtn.innerHTML = '<svg viewBox="0 0 24 24" style="width:12px;fill:currentColor;transform:rotate(180deg);margin-right:2px;"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg> RETURN';
                                document.querySelector('.channels-scroll-area').scrollTo({ top: 0, behavior: 'smooth' });
                                history.pushState({ isCategoryExpanded: true }, "", "#category");
                            }
                        };

                        headerWrapper.appendChild(newTitle);
                        headerWrapper.appendChild(seeAllBtn);
                        node.insertBefore(headerWrapper, grid);
                    }
                }
            });
        });
    });

    const channelsContainer = document.getElementById('channelsContainer');
    if(channelsContainer) observer.observe(channelsContainer, { childList: true, subtree: true });

    window.addEventListener('popstate', (event) => {
        document.querySelectorAll('.app-grid.expanded-grid').forEach(grid => grid.classList.remove('expanded-grid'));
        document.querySelectorAll('.cat-section.hidden-cat').forEach(cat => cat.classList.remove('hidden-cat'));
        document.querySelectorAll('.see-all-btn').forEach(btn => {
