<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<!-- Mobile Viewport සහ Zoom තහනම් කිරීම -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%; /* සම්පූර්ණ උස */
    overflow: hidden; /* Scrollbars ඉවත් කිරීම */
    background-color: #1a1a1a; /* ඩෙස්ක්ටොප් එකේ දෙපැත්තේ පෙනෙන පසුබිම් වර්ණය */
    
    /* iframe එක තිරයේ හරි මැදට ගෙන ඒම (Flexbox) */
    display: flex;
    justify-content: center; /* හරස් අතට මැද කිරීම */
    align-items: center;     /* උස අතට මැද කිරීම */
  }

  iframe {
    /* --- Mobile Screen එකක් මෙන් පෙන්වීමට අදාළ සැකසුම් --- */
    
    width: 100%;           /* ජංගම දුරකථන වලදී තිරය පුරාම පෙන්වීමට */
    max-width: 480px;      /* ඩෙස්ක්ටොප් වලදී ජංගම දුරකථනයක පළලට (480px) සීමා කිරීම */
    
    height: 100%;          /* උස තිරයේ උසට සමාන කිරීම */
    
    border: none;          /* රාමු ඉවත් කිරීම */
    background: #000;      /* iframe පසුබිම */
    
    /* ඩෙස්ක්ටොප් එකේදී ෆෝන් එකක් ලෙස පෙනීමට කුඩා සෙවනැල්ලක් (Optional) */
    box-shadow: 0 0 50px rgba(0,0,0,0.5); 
  }
</style>
</head>
<body>

   <iframe src="https://ultraflixpro.blogspot.com/" title="Mobile View Page">
   </iframe>

</body>
</html>
